<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios JavaScript</title>
    <style>
    body { font-family: Arial; padding: 20px; max-width: 700px; margin:auto; }
    h1 { text-align: center; }
    select, button, input { padding:5px 10px; margin:5px 0; font-size:16px; }
    #resultado { margin-top:20px; padding:10px; border:1px solid #ccc; min-height:50px; white-space: pre-wrap; }
    input { display:none; }
    </style>
</head>
<body>

    <h1>Ejercicios JavaScript</h1>

    <label for="selectEjercicio">Selecciona un ejercicio:</label>
    <select id="selectEjercicio">
        <option value="">--Selecciona un ejercicio--</option>
        <option value="1">Mostrar números del 1 al 10 con for-1</option>
        <option value="2">Sumar números del 1 al 100 con while-2</option>
        <option value="3">Mostrar números pares con for-3</option>
        <option value="4">Tabla de multiplicar con do-while-4</option>
        <option value="5">Calcular factorial con for-5</option>
        <option value="6">Contador regresivo con while-6</option>
        <option value="7">Suma de números pares en rango con for-7</option>
        <option value="8">Números impares con do-while-8</option>
        <option value="9">Potencia con ciclos for-9</option>
        <option value="10">Secuencia Fibonacci con while-10</option>
        <option value="11">Suma de elementos de vector con for-11</option>
        <option value="12">Encontrar máximo en vector con for-12</option>
        <option value="13">Buscar elemento en vector con while-13</option>
        <option value="14">Invertir vector con for-14</option>
        <option value="15">Contar elementos pares en vector con for-15</option>
        <option value="16">Promedio de elementos de vector con for-16</option>
        <option value="17">Eliminar duplicados de vector con for-17</option>
        <option value="18">Ordenar vector (burbuja) con for-18</option>
        <option value="19">Producto de elementos con while-19</option>
        <option value="20">Contar vocales en vector de letras con for-20</option>
        <option value="21">Matriz transpuesta con for anidados-21</option>
        <option value="22">Producto punto de vectores con for-22</option>
        <option value="23">Convolución de vectores con for anidados-23</option>
        <option value="24">Búsqueda binaria en vector ordenado con while-24</option>
        <option value="25">Rotar vector k posiciones con for-25</option>
        <option value="26">ejercicio 26</option>
        <option value="27">Combinar vectores ordenados con while-27</option>
        <option value="28">Criba de Eratóstenes con for anidados-28</option>
        <option value="29">Multiplicación de matrices con for anidados-29</option>
        <option value="30">Ordenamiento por mezcla con funciones recursivas-30</option>
    </select>

<div id="inputsContainer">
        <input id="subarrayInput" class="input-dinamico" placeholder="Ej: 1,2,3,-2,5">
        <input id="array1Input" class="input-dinamico" placeholder="Vector 1">
        <input id="array2Input" class="input-dinamico" placeholder="Vector 2">
    </div>

    
    <button id="botonEjecutar">Ejecutar</button>

    <div id="resultado"></div>


    <script type="module" src="menu.js"></script>

</body>
</html>
